spring.application.name=StudentArchives

# ===== 服务器配置 =====
server.servlet.context-path=/api

# ===== MySQL 数据库配置 =====
spring.datasource.url=jdbc:mysql://localhost:3306/student_archives?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=200604
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA 配置 =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Flyway 配置 =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.table=flyway_schema_history

# ===== 日志配置 =====
logging.level.com.example.studentarchives=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# ===== JWT 配置 =====
jwt.secret=ry3PI9VzWou05VvcDoxd7zKBevj3YmTCqSULTOy3DCk=
jwt.expiration-ms=86400000
